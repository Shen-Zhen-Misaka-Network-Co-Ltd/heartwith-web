name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/heartwith-web/package-lock.json

      - name: Install
        working-directory: clients/heartwith-web
        run: npm ci

      - name: Typecheck
        working-directory: clients/heartwith-web
        run: npm run typecheck

      - name: Build
        working-directory: clients/heartwith-web
        run: npm run build
