    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://font.sec.miui.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://font.sec.miui.com/font/css?family=MiSans:400,700:MiSans"
      media="print"
      onload="this.media='all'"
    />
    <title>Heartwith</title>
    <script>
      document.documentElement.style.background =
        window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? '#fff' : '#000'
    </script>
  </head>
  <body>
    <div id="app">
      <div class="html-boot">
        <div class="html-boot-title">Heartwith</div>
        <div class="html-boot-subtitle">正在启动</div>
      </div>
    </div>
